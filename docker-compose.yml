services:
  apex:
    build:
      context: ./apex
    ports:
      - "5000:5000"
    networks:
      - internal

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - apex
    networks:
      - internal
      - external

networks:
  internal:
    name: internal
    internal: true
  external:
    name: external

